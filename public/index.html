<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:">
<title>Modbus 测试工具</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
    <header>
        <div class="logo">⚡ Modbus 测试工具</div>
        <div class="status-bar">
            <span id="connStatus" class="status-dot disconnected">●</span>
            <span id="connStatusText">未连接</span>
        </div>
    </header>
    <main>
        <div class="left-panel">
            <section class="panel">
                <div class="panel-title">连接配置</div>
                <div class="form-row">
                    <label>模式</label>
                    <select id="connMode"><option value="tcp">TCP</option><option value="rtu">RTU</option></select>
                </div>
                <div id="tcpConfig" class="conn-config">
                    <div class="form-row"><label>主机</label><input id="connHost" type="text" placeholder="192.168.1.100" value="127.0.0.1"></div>
                    <div class="form-row"><label>端口</label><input id="connPort" type="number" value="502"></div>
                </div>
                <div id="rtuConfig" class="conn-config" style="display:none">
                    <div class="form-row"><label>串口</label><select id="connPortRtu"></select></div>
                    <div class="form-row"><label>波特率</label><select id="connBaud"><option>9600</option><option>19200</option><option selected>38400</option><option>57600</option><option>115200</option></select></div>
                    <div class="form-row"><label>数据位</label><select id="connDataBits"><option>8</option><option>7</option></select></div>
                    <div class="form-row"><label>停止位</label><select id="connStopBits"><option>1</option><option>2</option></select></div>
                    <div class="form-row"><label>校验</label><select id="connParity"><option value="none">无</option><option value="even">偶校验</option><option value="odd">奇校验</option></select></div>
                    <button class="btn btn-sm" id="scanSerialBtn">扫描串口</button>
                </div>
                <div class="form-row"><label>从站 ID</label><input id="connSlaveId" type="number" value="1" min="1" max="247"></div>
                <div class="form-row"><label>超时(s)</label><input id="connTimeout" type="number" value="5" min="1" max="60"></div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="connectBtn">连接</button>
                    <button class="btn btn-secondary" id="disconnectBtn" disabled>断开</button>
                </div>
            </section>
        </div>
        <div class="right-panel">
            <section class="panel">
                <div class="panel-title">操作</div>
                <div class="tabs">
                    <button class="tab active" data-tab="read">读取</button>
                    <button class="tab" data-tab="write">写入</button>
                </div>
                <div id="readPanel" class="tab-panel active">
                    <div class="form-row"><label>功能码</label>
                        <select id="readFc">
                            <option value="1">FC1 - 读线圈</option>
                            <option value="2">FC2 - 读离散输入</option>
                            <option value="3" selected>FC3 - 读保持寄存器</option>
                            <option value="4">FC4 - 读输入寄存器</option>
                        </select>
                    </div>
                    <div class="form-row"><label>起始地址</label><input id="readAddr" type="number" value="0" min="0"></div>
                    <div class="form-row"><label>数量</label><input id="readQty" type="number" value="10" min="1" max="125"></div>
                    <button class="btn btn-primary" id="readBtn">执行读取</button>
                </div>
                <div id="writePanel" class="tab-panel">
                    <div class="form-row"><label>功能码</label>
                        <select id="writeFc">
                            <option value="5">FC5 - 写单个线圈</option>
                            <option value="6" selected>FC6 - 写单个寄存器</option>
                            <option value="15">FC15 - 写多个线圈</option>
                            <option value="16">FC16 - 写多个寄存器</option>
                        </select>
                    </div>
                    <div class="form-row"><label>地址</label><input id="writeAddr" type="number" value="0" min="0"></div>
                    <div class="form-row"><label>值</label><input id="writeValue" type="text" placeholder="0 或 0x1A"></div>
                    <button class="btn btn-primary" id="writeBtn">执行写入</button>
                </div>
            </section>
        </div>
    </main>
    <section class="panel data-section">
        <div class="panel-title">
            <span>数据</span>
            <div class="poll-controls">
                <label class="toggle-label"><input type="checkbox" id="pollToggle"> <span>自动轮询</span></label>
                <span class="form-group-inline">
                    <label>间隔(ms)</label><input id="pollInterval" type="number" value="1000" min="100" step="100">
                </span>
            </div>
        </div>
        <div class="table-wrap">
            <table id="dataTable">
                <thead><tr>
                    <th>地址</th>
                    <th>值（十进制）</th>
                    <th>十六进制</th>
                    <th>二进制</th>
                    <th>Float</th>
                    <th>Char</th>
                </tr></thead>
                <tbody id="dataBody">
                    <tr><td colspan="6" class="empty">暂无数据，请先连接并读取</td></tr>
                </tbody>
            </table>
        </div>
    </section>
    <section class="panel log-section">
        <div class="panel-title">日志</div>
        <div id="logBox"></div>
    </section>
</div>
<script src="js/app.js"></script>
</body>
</html>
